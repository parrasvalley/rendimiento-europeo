<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rendimiento Europeo - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0f1a;color:#f0ede8;font-family:system-ui,sans-serif;font-size:16px;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    select option{background:#0a0f1a;}
    ::-webkit-scrollbar{width:24px;}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}
    ::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.55);border-radius:12px;border:5px solid transparent;background-clip:padding-box;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(167,139,250,0.75);background-clip:padding-box;}
    @media(min-width:900px){
      body{font-size:18px;}
    }
    @media(max-width:480px){
      input,select{font-size:16px !important;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

var PIN="1986";
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var LIVE_KEY="rendeur-v1";
var HIST_KEY="rendeur-hist-v1";
var PROD_KEY="produccion-v1";
var COL="#a78bfa";
var CLIENTES_EUROPEO=["Sin cliente","Lakeway","DQP","Wholesum","4 Earth","Perfresh","Nature Sweet","Produce Team","Custom Pack","Lipman"];

async function fbGet(k){try{var r=await fetch(FB+"/"+k+".json");return r.ok?await r.json():null;}catch(e){return null;}}
async function fbSet(k,v){try{await fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}}

function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function ni(v){var x=parseInt(v);return isNaN(x)?0:x;}
function r1(n){return Math.round(n*10)/10;}
function r2(n){return Math.round(n*100)/100;}
function pct(n,t){return t>0?r1(n/t*100):0;}
function fechaHoy(){return new Date().toLocaleDateString("es-MX",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});}

function semRend(p){
  if(p<60)return{c:"#f87171",bg:"rgba(248,113,113,0.12)",br:"rgba(248,113,113,0.4)",t:"BAJO"};
  if(p<75)return{c:"#fbbf24",bg:"rgba(251,191,36,0.12)",br:"rgba(251,191,36,0.4)",t:"REGULAR"};
  return{c:"#4ade80",bg:"rgba(74,222,128,0.12)",br:"rgba(74,222,128,0.4)",t:"BUENO"};
}

function initForm(){
  return{
    malla:"",cliente:"",
    rejas:"",pesoReja:"",piezasReja:"",
    cajas24Pri:"",cajas12Pri:"",
    cajas24Seg:"",cajas12Seg:"",
    cajas19:"",piezasCaja19:"110"
  };
}

function calcEntry(f){
  var rejas=nv(f.rejas); var pesoReja=nv(f.pesoReja); var pzReja=nv(f.piezasReja);
  var kgRecibido=r2(rejas*pesoReja);
  var pzRecibido=Math.round(rejas*pzReja);

  var c24p=ni(f.cajas24Pri); var c12p=ni(f.cajas12Pri);
  var c24s=ni(f.cajas24Seg); var c12s=ni(f.cajas12Seg);
  var c19=ni(f.cajas19); var pzC19=ni(f.piezasCaja19)||110;

  var pz24p=c24p*24; var pz12p=c12p*12;
  var pz24s=c24s*24; var pz12s=c12s*12;
  var pz19=c19*pzC19;

  var pzPrimera=pz24p+pz12p;
  var pzSegunda=pz24s+pz12s;
  var pzTercera=pz19;
  var pzEmpacado=pzPrimera+pzSegunda+pzTercera;

  return{
    kgRecibido:kgRecibido,pzRecibido:pzRecibido,
    pzPrimera:pzPrimera,pzSegunda:pzSegunda,pzTercera:pzTercera,pzEmpacado:pzEmpacado,
    pctPrimera:pct(pzPrimera,pzRecibido),pctSegunda:pct(pzSegunda,pzRecibido),
    pctTercera:pct(pzTercera,pzRecibido),pctTotal:pct(pzEmpacado,pzRecibido)
  };
}

function LineChart(props){
  var series=props.series||[]; var height=props.height||120;
  if(!series.length||!series[0].datos.length)return null;
  var allVals=[];
  series.forEach(function(s){s.datos.forEach(function(d){if(d.v>0)allVals.push(d.v);});});
  if(allVals.length<2)return <div style={{textAlign:"center",padding:16,color:"#9ca3af",fontSize:20,fontWeight:800}}>Sin suficientes datos aun</div>;
  var maxV=Math.max.apply(null,allVals);
  var minV=Math.min.apply(null,allVals);
  if(maxV===minV){maxV=maxV*1.1;minV=minV*0.9;}
  var pad={t:16,b:24,l:40,r:12};
  var W=500; var H=height;
  var iW=W-pad.l-pad.r; var iH=H-pad.t-pad.b;
  var gridVals=[minV,minV+(maxV-minV)*0.5,maxV];
  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{overflow:"visible"}}>
      {gridVals.map(function(gv,i){
        var y=pad.t+iH*(1-(gv-minV)/(maxV-minV));
        return (
          <g key={i}>
            <line x1={pad.l} y1={y} x2={pad.l+iW} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
            <text x={pad.l-4} y={y+4} textAnchor="end" fontSize="9" fill="#6b7280">{r1(gv)}%</text>
          </g>
        );
      })}
      {series.map(function(s,si){
        var datosReales=s.datos.filter(function(d){return d.v>0;});
        var pts=datosReales.map(function(d,i){
          var x=pad.l+iW*(i/(datosReales.length-1||1));
          var y=pad.t+iH*(1-(d.v-minV)/(maxV-minV||1));
          return{x:x,y:y,v:d.v,label:d.label};
        });
        var path="M"+pts.map(function(p){return p.x+","+p.y;}).join(" L");
        return (
          <g key={si}>
            <path d={path} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinejoin="round"/>
            {pts.map(function(p,i){
              return (
                <g key={i}>
                  <circle cx={p.x} cy={p.y} r="5" fill="#0a0f1a" stroke={s.color} strokeWidth="2"/>
                  <circle cx={p.x} cy={p.y} r="2.5" fill={s.color}/>
                  <text x={p.x} y={H-6} textAnchor="middle" fontSize="9" fill="#6b7280">{p.label}</text>
                  <text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fill={s.color} fontWeight="700">{r1(p.v)}%</text>
                </g>
              );
            })}
          </g>
        );
      })}
    </svg>
  );
}

function ModalPin(props){
  var s1=useState(""); var v=s1[0]; var sv=s1[1];
  var s2=useState(false); var err=s2[0]; var sErr=s2[1];
  function ok(){if(v===PIN){sv("");sErr(false);props.onOk();}else{sErr(true);sv("");}}
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#120e26",border:"2px solid rgba(167,139,250,0.35)",borderRadius:16,padding:32,maxWidth:300,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:25,fontWeight:900,color:"#f0f0e8",marginBottom:6}}>Acceso de editor</div>
        <div style={{fontSize:20,color:"#9ca3af",marginBottom:20}}>PIN para registrar y editar</div>
        <input type="number" value={v} onChange={function(e){sv(e.target.value.slice(0,8));sErr(false);}} placeholder="PIN"
          style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(err?"#f87171":"rgba(167,139,250,0.4)"),borderRadius:10,padding:"12px",color:COL,fontFamily:"Georgia,serif",fontSize:36,textAlign:"center",outline:"none",marginBottom:err?8:16,letterSpacing:6}}/>
        {err&&<div style={{fontSize:20,fontWeight:800,color:"#f87171",marginBottom:12}}>PIN incorrecto</div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={props.onCancel} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#9ca3af",fontSize:21,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
          <button onClick={ok} style={{flex:1,padding:"11px",background:"linear-gradient(135deg,#6d28d9,#a78bfa)",border:"none",borderRadius:9,color:"#fff",fontSize:21,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  var s1=useState("captura"); var tab=s1[0]; var setTab=s1[1];
  var s2=useState(initForm()); var form=s2[0]; var setForm=s2[1];
  var s3=useState([]); var live=s3[0]; var setLive=s3[1];
  var s4=useState([]); var hist=s4[0]; var setHist=s4[1];
  var s5=useState(false); var auth=s5[0]; var setAuth=s5[1];
  var s6=useState(false); var showPin=s6[0]; var setShowPin=s6[1];
  var s7=useState(null); var pinCb=s7[0]; var setPinCb=s7[1];
  var s8=useState(false); var mob=s8[0]; var setMob=s8[1];
  var s9=useState(null); var editM=s9[0]; var setEditM=s9[1];
  var s10=useState(null); var openH=s10[0]; var setOpenH=s10[1];
  var s11=useState(null); var openA=s11[0]; var setOpenA=s11[1];

  useEffect(function(){
    function resize(){setMob(window.innerWidth<768);}
    resize();
    window.addEventListener("resize",resize);
    return function(){window.removeEventListener("resize",resize);};
  },[]);

  useEffect(function(){
    function cargar(){
      fbGet(LIVE_KEY).then(function(d){if(d&&Array.isArray(d))setLive(d);});
      fbGet(HIST_KEY).then(function(d){if(d&&Array.isArray(d))setHist(d);});
    }
    cargar();
    var t=setInterval(cargar,30000);
    return function(){clearInterval(t);};
  },[]);

  function savLive(v){setLive(v);fbSet(LIVE_KEY,v);}
  function savHist(v){setHist(v);fbSet(HIST_KEY,v);}

  function setF(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}

  var s12=useState(false); var cargandoProd=s12[0]; var setCargandoProd=s12[1];
  var s14=useState(new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"})); var fechaProd=s14[0]; var setFechaProd=s14[1];
  var s13=useState(""); var msgProd=s13[0]; var setMsgProd=s13[1];

  function traerDeProduccion(){
    if(!form.malla){setMsgProd("Escribe la malla primero");return;}
    setCargandoProd(true);
    setMsgProd("");
    fbGet(PROD_KEY).then(function(datos){
      setCargandoProd(false);
      if(!datos||!datos.Europeo||!datos.Europeo.registros){setMsgProd("Sin datos en Produccion todavia");return;}
      var hoyStr=fechaProd;
      var regs=datos.Europeo.registros.filter(function(r){
        return String(r.malla)===String(form.malla)&&r.fecha===hoyStr;
      });
      if(!regs.length){setMsgProd("No hay registros de hoy para la malla "+form.malla+" en Produccion");return;}
      var c24p=0,c12p=0,c24s=0,c12s=0,c19=0;
      regs.forEach(function(r){
        var cajas=parseInt(r.cajas)||0;
        if(r.calidad==="Primera"&&r.presentacion==="24ct")c24p+=cajas;
        else if(r.calidad==="Primera"&&r.presentacion==="12ct")c12p+=cajas;
        else if(r.calidad==="Segunda"&&r.presentacion==="24ct")c24s+=cajas;
        else if(r.calidad==="Segunda"&&r.presentacion==="12ct")c12s+=cajas;
        else if(r.presentacion==="1/9 bushel"||r.calidad==="Bushel")c19+=cajas;
      });
      setForm(function(f){return Object.assign({},f,{
        cajas24Pri:String(c24p),cajas12Pri:String(c12p),
        cajas24Seg:String(c24s),cajas12Seg:String(c12s),
        cajas19:String(c19)
      });});
      setMsgProd(regs.length+" registros de Produccion sumados (todos los clientes)");
    });
  }

  function pinReq(cb){
    if(auth){cb();return;}
    setPinCb(function(){return cb;});
    setShowPin(true);
  }
  function pinOk(){
    setAuth(true);setShowPin(false);
    if(pinCb){pinCb();setPinCb(null);}
  }

  var calc=calcEntry(form);
  var canSave=form.malla&&calc.pzRecibido>0;

  function guardar(){
    if(!canSave)return;
    var e={id:Date.now(),hora:new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}),
      rancho:"Cordillera",producto:"Europeo",
      malla:form.malla,cliente:form.cliente||"",
      rejas:nv(form.rejas),pesoReja:nv(form.pesoReja),piezasReja:nv(form.piezasReja),
      cajas24Pri:ni(form.cajas24Pri),cajas12Pri:ni(form.cajas12Pri),
      cajas24Seg:ni(form.cajas24Seg),cajas12Seg:ni(form.cajas12Seg),
      cajas19:ni(form.cajas19),piezasCaja19:ni(form.piezasCaja19)||110};
    Object.assign(e,calcEntry(e));
    savLive(live.concat([e]));
    var ultPzC19=form.piezasCaja19;
    setForm(Object.assign(initForm(),{piezasCaja19:ultPzC19}));
  }

  function guardarEdicion(mEditada){
    var calc2=calcEntry(mEditada);
    var m=Object.assign({},mEditada,calc2);
    var enVivo=live.map(function(x){return x.id===m.id?m:x;});
    if(JSON.stringify(enVivo)!==JSON.stringify(live))savLive(enVivo);
    var nuevoHist=hist.map(function(h){
      var nuevasEntradas=(h.entradas||[]).map(function(x){return x.id===m.id?m:x;});
      return Object.assign({},h,{entradas:nuevasEntradas});
    });
    savHist(nuevoHist);
    setEditM(null);
  }

  function cerrarDia(){
    if(!live.length)return;
    var snap={fecha:fechaHoy(),ts:Date.now(),entradas:live.slice()};
    savHist([snap].concat(hist).slice(0,250));
    savLive([]);
    setTab("historial");
  }

  // ACUMULADO: derivado de hist, agrupado por malla
  var acumPorMalla={};
  hist.forEach(function(h){
    (h.entradas||[]).forEach(function(e){
      var key=e.malla;
      var prev=acumPorMalla[key]||{malla:e.malla,cliente:e.cliente,totalRejas:0,kgRecibido:0,pzRecibido:0,
        pzPrimera:0,pzSegunda:0,pzTercera:0,primerReg:"",ultimoReg:"",series:[]};
      prev.totalRejas+=e.rejas;
      prev.kgRecibido+=e.kgRecibido;
      prev.pzRecibido+=e.pzRecibido;
      prev.pzPrimera+=e.pzPrimera;
      prev.pzSegunda+=e.pzSegunda;
      prev.pzTercera+=e.pzTercera;
      if(!prev.primerReg||h.ts<prev.primerReg)prev.primerReg=h.fecha;
      if(!prev.ultimoReg||h.ts>(prev.ultimoTs||0)){prev.ultimoReg=h.fecha;prev.ultimoTs=h.ts;}
      prev.series.push({label:h.fecha.split(" ").slice(0,2).join(" "),v:e.pctPrimera,ts:h.ts});
      acumPorMalla[key]=prev;
    });
  });
  var acumArr=Object.keys(acumPorMalla).map(function(k){
    var a=acumPorMalla[k];
    a.pctPrimera=pct(a.pzPrimera,a.pzRecibido);
    a.pctSegunda=pct(a.pzSegunda,a.pzRecibido);
    a.pctTercera=pct(a.pzTercera,a.pzRecibido);
    a.pctTotal=pct(a.pzPrimera+a.pzSegunda+a.pzTercera,a.pzRecibido);
    a.series.sort(function(x,y){return x.ts-y.ts;});
    return a;
  });

  var INP={width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"10px 12px",color:"#f0f0e8",fontFamily:"system-ui",fontSize:23,fontWeight:800,outline:"none"};
  var LBL={fontSize:17,color:"#c4b5fd",fontWeight:800,textTransform:"uppercase",letterSpacing:1.3,marginBottom:5,display:"block"};

  return (
    <div style={{background:"#0a0f1a",minHeight:"100vh"}}>
      <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(167,139,250,0.25)",padding:mob?"0 12px":"0 36px",display:"flex",alignItems:"center",height:mob?54:62,position:"sticky",top:0,zIndex:50}}>
        <div style={{fontSize:mob?15:20,fontWeight:900,color:COL,letterSpacing:2,marginRight:mob?8:36}}>RENDIMIENTO</div>
        <div style={{display:"flex",flex:1}}>
          {[["captura","Captura"],["historial","Historial"],["acumulado","Acumulado"]].map(function(item){
            var ac=tab===item[0];
            return (
              <button key={item[0]} onClick={function(){setTab(item[0]);}}
                style={{padding:mob?"0 10px":"0 20px",height:mob?54:62,border:"none",borderBottom:ac?"3px solid "+COL:"3px solid transparent",background:"transparent",fontSize:mob?12:14,fontWeight:900,cursor:"pointer",color:ac?COL:"#6b7280",fontFamily:"system-ui"}}>
                {item[1]}
                {item[0]==="captura"&&live.length>0&&<span style={{marginLeft:4,background:COL,borderRadius:20,padding:"1px 7px",fontSize:17,color:"#fff",fontWeight:900}}>{live.length}</span>}
              </button>
            );
          })}
        </div>
        <button onClick={function(){if(!auth){setShowPin(true);setPinCb(null);}else{setAuth(false);}}}
          style={{padding:mob?"7px 10px":"8px 16px",borderRadius:22,background:auth?"rgba(167,139,250,0.18)":"rgba(255,255,255,0.06)",color:auth?COL:"#6b7280",fontWeight:800,fontSize:mob?11:13,cursor:"pointer",border:"2px solid "+(auth?"rgba(167,139,250,0.35)":"rgba(255,255,255,0.12)"),fontFamily:"system-ui"}}>
          {auth?"EDITOR":"LECTOR"}
        </button>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:mob?"14px 12px 80px":"24px 36px 80px"}}>

      {/* CAPTURA */}
      {tab==="captura"&&(
        <div style={{display:mob?"block":"grid",gridTemplateColumns:"440px 1fr",gap:24}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

            <div style={{background:"linear-gradient(135deg,rgba(109,40,217,0.18),rgba(167,139,250,0.1))",border:"2px solid rgba(167,139,250,0.4)",borderRadius:13,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:11,color:"#c4b5fd",fontWeight:800,letterSpacing:1.5,textTransform:"uppercase"}}>Rancho</div>
                <div style={{fontSize:26,fontWeight:900,color:"#fff"}}>Cordillera</div>
              </div>
              <div style={{width:2,height:36,background:"rgba(167,139,250,0.3)"}}/>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"#c4b5fd",fontWeight:800,letterSpacing:1.5,textTransform:"uppercase"}}>Producto</div>
                <div style={{fontSize:26,fontWeight:900,color:"#fff"}}>Europeo</div>
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.09)",borderRadius:13,padding:"18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <label style={LBL}>Malla *</label>
                  <input style={Object.assign({},INP,{borderColor:!form.malla?"rgba(248,113,113,0.4)":"rgba(255,255,255,0.12)"})} placeholder="Ej: 5" value={form.malla} onChange={function(e){setF("malla",e.target.value);}}/>
                </div>
                <div>
                  <label style={LBL}>Cliente</label>
                  <select style={INP} value={form.cliente} onChange={function(e){setF("cliente",e.target.value);}}>
                    <option value="">-- Seleccionar --</option>
                    {CLIENTES_EUROPEO.map(function(c){return <option key={c} value={c}>{c}</option>;})}
                  </select>
                </div>
              </div>
            </div>

            <div style={{background:"rgba(167,139,250,0.06)",border:"2px solid rgba(167,139,250,0.25)",borderRadius:11,padding:"12px 16px"}}>
              <div style={{fontSize:12,fontWeight:800,color:"#c4b5fd",marginBottom:8}}>Fecha para jalar de Produccion</div>
              <input style={Object.assign({},INP,{fontSize:16,textAlign:"center",letterSpacing:1})} placeholder="dd/mm/aaaa" value={fechaProd} onChange={function(e){setFechaProd(e.target.value);}}/>
              <div style={{fontSize:11,color:"#6b7280",marginTop:6}}>Hoy: {new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"})}</div>
            </div>

            <button onClick={traerDeProduccion} disabled={cargandoProd}
              style={{padding:"13px",background:"rgba(167,139,250,0.12)",border:"2px solid rgba(167,139,250,0.4)",borderRadius:11,fontSize:14,fontWeight:800,color:COL,cursor:"pointer",fontFamily:"system-ui"}}>
              {cargandoProd?"Buscando...":"Traer empacado de Europeo (Produccion)"}
            </button>
            {msgProd&&<div style={{fontSize:13,color:msgProd.indexOf("traidos")>=0?"#4ade80":"#fbbf24",textAlign:"center",fontWeight:700}}>{msgProd}</div>}

            <div style={{background:"rgba(74,222,128,0.05)",border:"2px solid rgba(74,222,128,0.2)",borderRadius:13,padding:"18px"}}>

                        var pzSeg24=e.cajas24Seg*24; var pzSeg12=e.cajas12Seg*12;
                        var pzTer=e.pzTercera;

                          <div key={e.id} style={{background:"rgba(0,0,0,0.3)",border:"2px solid "+sm2.c+"44",borderRadius:12,padding:"18px",marginBottom:12}}>

                                {e.cliente&&<div style={{fontSize:13,color:"#6b7280",marginTop:2}}>{e.cliente}</div>}

                              </div>
                            </div>

                                </div>
                                <div style={{textAlign:"center"}}>
                                  <div style={{fontSize:11,color:"#6b7280"}}>PZ / REJA</div>
                                  <div style={{fontSize:24,fontWeight:900,color:"#4ade80",fontFamily:"Georgia,serif"}}>{e.piezasReja}</div>
                                </div>

                                  <div style={{fontSize:18,fontWeight:900,color:"#fbbf24"}}>{e.cajas12Seg||0}</div>
                                  <div style={{fontSize:10,color:"#6b7280"}}>{pzSeg12} pz</div>
                                </div>

                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                              </div>

                              <div style={{marginTop:6,fontSize:13,color:"#6b7280"}}>Piezas recibidas ({e.pzRecibido}) - piezas empacadas ({e.pzEmpacado})</div>

                            {auth&&<button onClick={function(){setEditM(Object.assign({},e));}} style={{marginTop:12,padding:"8px 18px",background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:7,color:COL,fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Editar</button>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })
          }
          {hist.length>0&&(
            <button onClick={function(){pinReq(function(){savHist([]);});}} style={{marginTop:10,padding:"10px 22px",background:"transparent",border:"2px solid rgba(248,113,113,0.2)",borderRadius:9,fontSize:20,fontWeight:800,color:"#9ca3af",cursor:"pointer",fontFamily:"system-ui"}}>
              Borrar historial
            </button>
          )}
        </div>

      {tab==="acumulado"&&(
        <div>
          {!acumArr.length
            ? <div style={{textAlign:"center",padding:60,color:"#6b7280",fontSize:25,fontWeight:800}}>El acumulado aparece al cerrar el primer dia</div>

                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>

                      <div style={{background:"rgba(0,0,0,0.3)",borderRadius:9,padding:"10px 6px",textAlign:"center"}}>
                        <div style={{fontSize:16,color:"#9ca3af"}}>TERCERA</div>
                        <div style={{fontSize:30,fontWeight:900,color:"#fb923c",fontFamily:"Georgia,serif"}}>{r1(a.pctTercera)}%</div>
                      </div>
                    </div>
                    <div onClick={function(){setOpenA(isOpen?null:i);}} style={{cursor:"pointer",fontSize:20,fontWeight:800,color:COL,marginBottom:isOpen?10:0}}>
                      {isOpen?"Ocultar grafica":"Ver tendencia de %1ra"}
                    </div>
                    {isOpen&&(
                      <LineChart series={[{label:"Malla "+a.malla,color:COL,datos:a.series}]} height={130}/>
                    )}
                  </div>
                </div>
              );
            })
          }
        </div>
      )}

      </div>

      {/* Modal edicion */}
      {editM&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
          <div style={{background:"#120e26",border:"2px solid rgba(167,139,250,0.35)",borderRadius:16,padding:"24px",maxWidth:480,width:"100%"}}>
            <div style={{fontSize:23,fontWeight:900,color:COL,marginBottom:20}}>Editar registro - Malla {editM.malla}</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div>
                <label style={LBL}>Malla</label>
                <input style={INP} value={editM.malla||""} onChange={function(e){setEditM(function(p){return Object.assign({},p,{malla:e.target.value});});}}/>
              </div>
              <div>
                <label style={LBL}>Cliente</label>
                <select style={INP} value={editM.cliente||""} onChange={function(e){setEditM(function(p){return Object.assign({},p,{cliente:e.target.value});});}}>
                  <option value="">-- Seleccionar --</option>
                  {CLIENTES_EUROPEO.map(function(c){return <option key={c} value={c}>{c}</option>;})}
                </select>
              </div>
            </div>

            <div style={{fontSize:18,fontWeight:800,color:"#4ade80",marginBottom:8}}>RECIBIDO</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
              {[["Rejas","rejas"],["Kg/reja","pesoReja"],["Pz/reja","piezasReja"]].map(function(x){
                return (
                  <div key={x[1]}>
                    <label style={{fontSize:15,color:"#4ade80",fontWeight:800}}>{x[0]}</label>
                    <input type="number" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(74,222,128,0.3)",borderRadius:7,padding:"8px",color:"#4ade80",fontFamily:"Georgia,serif",fontSize:23,fontWeight:800,textAlign:"center",outline:"none"}}
                      value={editM[x[1]]||""} onChange={function(e){var k=x[1];setEditM(function(p){var n=Object.assign({},p);n[k]=nv(e.target.value);return n;});}}/>
                  </div>
                );
              })}
            </div>

            <div style={{fontSize:18,fontWeight:800,color:COL,marginBottom:8}}>EMPACADO PRIMERA</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {[["Cajas 24s","cajas24Pri"],["Cajas 12s","cajas12Pri"]].map(function(x){
                return (
                  <div key={x[1]}>
                    <label style={{fontSize:15,color:COL,fontWeight:800}}>{x[0]}</label>
                    <input type="number" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(167,139,250,0.3)",borderRadius:7,padding:"8px",color:COL,fontFamily:"Georgia,serif",fontSize:23,fontWeight:800,textAlign:"center",outline:"none"}}
                      value={editM[x[1]]||""} onChange={function(e){var k=x[1];setEditM(function(p){var n=Object.assign({},p);n[k]=ni(e.target.value);return n;});}}/>
                  </div>
                );
              })}
            </div>

            <div style={{fontSize:18,fontWeight:800,color:"#fbbf24",marginBottom:8}}>EMPACADO SEGUNDA</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {[["Cajas 24s","cajas24Seg"],["Cajas 12s","cajas12Seg"]].map(function(x){
                return (
                  <div key={x[1]}>
                    <label style={{fontSize:15,color:"#fbbf24",fontWeight:800}}>{x[0]}</label>
                    <input type="number" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:7,padding:"8px",color:"#fbbf24",fontFamily:"Georgia,serif",fontSize:23,fontWeight:800,textAlign:"center",outline:"none"}}
                      value={editM[x[1]]||""} onChange={function(e){var k=x[1];setEditM(function(p){var n=Object.assign({},p);n[k]=ni(e.target.value);return n;});}}/>
                  </div>
                );
              })}
            </div>

            <div style={{fontSize:18,fontWeight:800,color:"#fb923c",marginBottom:8}}>EMPACADO TERCERA (1/9)</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
              {[["Cajas 1/9","cajas19"],["Piezas x caja","piezasCaja19"]].map(function(x){
                return (
                  <div key={x[1]}>
                    <label style={{fontSize:15,color:"#fb923c",fontWeight:800}}>{x[0]}</label>
                    <input type="number" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(251,146,60,0.3)",borderRadius:7,padding:"8px",color:"#fb923c",fontFamily:"Georgia,serif",fontSize:23,fontWeight:800,textAlign:"center",outline:"none"}}
                      value={editM[x[1]]||""} onChange={function(e){var k=x[1];setEditM(function(p){var n=Object.assign({},p);n[k]=ni(e.target.value);return n;});}}/>
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={function(){setEditM(null);}}
                style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#9ca3af",fontSize:21,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>
                Cancelar
              </button>
              <button onClick={function(){guardarEdicion(editM);}}
                style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#6d28d9,#a78bfa)",border:"none",borderRadius:9,color:"#fff",fontSize:21,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>
                Guardar cambios
              </button>
            </div>
          </div>
        </div>
      )}

      {showPin&&<ModalPin onOk={function(){pinOk();}} onCancel={function(){setShowPin(false);setPinCb(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
